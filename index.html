<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I miss you</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.card{
  background:white;
  padding:40px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  max-width:400px;
  position:relative;
  z-index:2;
}

button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
}

#yes{
  background:#4CAF50;
  color:white;
}

#no{
  background:#ff4d4d;
  color:white;
  position:relative;
}

/* Floating hearts */

.heart{
  position:absolute;
  font-size:24px;
  animation: floatUp 2s ease-out forwards;
  z-index:9999;
  pointer-events:none; /* so hearts don't block clicks */
}

@keyframes floatUp{
  0%{
    transform: translateY(0) scale(1);
    opacity:1;
  }
  100%{
    transform: translateY(-200px) scale(1.8);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="card" id="card">
  <h2>Hey Beautiful</h2>
  <p>I miss you so much, Do you miss me?</p>

  <button id="yes" onclick="next()">YES</button>
  <button id="no">NO</button>
</div>

<script>

let step = 0;

/* NO button runs away */
function attachNoButton(){
  const noBtn = document.getElementById("no");

  if(noBtn){
    noBtn.addEventListener("mouseover",()=>{
      const x = Math.random()*300-150;
      const y = Math.random()*200-100;
      noBtn.style.transform=`translate(${x}px,${y}px)`;
    });
  }
}

attachNoButton();

/* Floating hearts */
function createHearts(){
  for(let i=0;i<8;i++){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    // Random position slightly above bottom so hearts are visible
    heart.style.left = Math.random()*(window.innerWidth-50) + "px";
    heart.style.top = (window.innerHeight-150) + "px";

    heart.style.fontSize = (20 + Math.random()*20) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
      heart.remove();
    },2000);
  }
}

/* Steps */
function next(){
  createHearts();

  const card = document.getElementById("card");
  step++;

  if(step === 1){
    card.innerHTML = `
      <h2>I knew it 😏</h2>
      <p>We should have dinner soon would you ne available Friday or Saturday Night</p>

      <button id="yes" onclick="next()">YES</button>
      <button id="no">NO</button>
    `;
  }

  else if(step === 2){
    card.innerHTML = `
      <h2>Hmmmm 🤔</h2>
      <p>Then maybe you should text me.</p>
      <p>Will you text me?</p>

      <button id="yes" onclick="next()">YES</button>
      <button id="no">NO</button>
    `;
  }

  else if(step === 3){
    card.innerHTML = `
      <h2>Good choice 😌</h2>
      <p>I'll be waiting for your text... Love Credo</p>
      <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" width="250">
    `;
  }

  attachNoButton();
}

</script>

</body>
</html>

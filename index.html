```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A Question For You ❤️</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.card{
  background:white;
  padding:40px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  max-width:400px;
}

button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
}

#yes{
  background:#4CAF50;
  color:white;
}

#no{
  background:#ff4d4d;
  color:white;
  position:relative;
}
</style>
</head>

<body>

<div class="card" id="card">
  <h2>Hey 😊</h2>
  <p>Hello Bonolo, Do you miss me?</p>

  <button id="yes" onclick="next()">YES</button>
  <button id="no">NO</button>
</div>

<script>
let step = 0;

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover",()=>{
  const x = Math.random()*300-150;
  const y = Math.random()*200-100;
  noBtn.style.transform=`translate(${x}px,${y}px)`;
});

function next(){
  const card = document.getElementById("card");
  step++;

  if(step === 1){
    card.innerHTML = `
      <h2>I knew it 😏</h2>
      <p>I've noticed you've been stalking me on TikTok again...</p>
      <button id="yes" onclick="next()">YES</button>
    `;
  }

  else if(step === 2){
    card.innerHTML = `
      <h2>Hmmmm 🤔</h2>
      <p>Then maybe you should text me.</p>
      <p>Will you text me?</p>
      <button id="yes" onclick="next()">YES</button>
    `;
  }

  else if(step === 3){
    card.innerHTML = `
      <h2>Good choice 😌</h2>
      <p>I'll be waiting for your message...</p>
      <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" width="250">
    `;
  }
}
</script>

</body>
</html>
```

  text-align:center;
  overflow:hidden;

.card{
  background:white;
  padding:40px;
  border-radius:15px;

  max-width:400px;
  position:relative;
  z-index:2;
}

button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
}

#yes{
  background:#4CAF50;
  color:white;
}

#no{
  background:#ff4d4d;
  color:white;
  position:relative;
}

/* Floating hearts */

.heart{
  position:fixed;
  font-size:24px;
  animation: floatUp 2s ease-out forwards;
  z-index:1;
}

@keyframes floatUp{
  0%{
    transform: translateY(0) scale(1);
    opacity:1;
  }
  100%{
    transform: translateY(-200px) scale(1.8);
    opacity:0;
  }
}
</style>
</head>

  <p>Do you miss me?</p>

</div>
